query AnimeStaff(
    $id: String!
) {
    animes(ids: $id) {
        personRoles {
            ...PersonRoleShort
        }
    }
}

query MangaStaff(
    $id: String!
) {
    mangas(ids: $id) {
        personRoles {
            ...PersonRoleShort
        }
    }
}

query StaffSearch(
    $page: PositiveInt!
    $limit: PositiveInt!
    $search: String!
) {
    people(page: $page, limit: $limit, search: $search) {
        ...ShikiStaffShort
    }
}