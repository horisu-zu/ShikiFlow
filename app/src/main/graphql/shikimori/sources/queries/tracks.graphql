query AnimeTracks(
    $page: PositiveInt = 1
    $limit: PositiveInt = 2
    $userId: ID
    $status: UserRateStatusEnum
    $order: UserRateOrderInputType
) {
    userRates(
        page: $page,
        limit: $limit,
        targetType: Anime,
        status: $status,
        userId: $userId,
        order: $order
    ) {
        ...AnimeUserRateWithModel
    }
}

query AnimeTrackBrowse(
    $page: PositiveInt = 1
    $limit: PositiveInt = 2
    $mylist: MylistString
    $search: String
) {
    animes(page: $page, limit: $limit, mylist: $mylist, search: $search) {
        userRate {
            ...AnimeUserRateWithModel
        }
    }
}

