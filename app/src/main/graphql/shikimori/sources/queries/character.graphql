query CharacterDetails(
    $ids: String
) {
    characters(ids: $ids) {
        #id
        #malId
        #name
        #ussian
        #japanese
        #synonyms
        #url
        #createdAt
        #updatedAt
        #isAnime
        #isManga
        #isRanobe

        poster { ...PosterShort }

        #description
        #descriptionHtml
        #escriptionSource
    }
}

query CharacterSearch(
    $page: PositiveInt!
    $limit: PositiveInt!
    $search: String!
) {
    characters(page: $page, limit: $limit, search: $search) {
        ...CharacterShort
    }
}

query AnimeCharacters(
    $id: String!
) {
    animes(ids: $id) {
        characterRoles {
            ...ShikiCharacterRole
        }
    }
}

query MangaCharacters(
    $id: String!
) {
    mangas(ids: $id) {
        characterRoles {
            ...ShikiCharacterRole
        }
    }
}