query MediaListTracksQuery(
    $page: Int = 0,
    $limit: Int = 10,
    $type: MediaType,
    $userId: Int,
    $status: MediaListStatus,
    $order: [MediaListSort] = [UPDATED_TIME_DESC],
    $idsIn: [Int]
) {
    Page(page: $page, perPage: $limit) {
        mediaList(
            type: $type,
            userId: $userId,
            status: $status,
            sort: $order,
            mediaId_in: $idsIn
        ) {
            ...MediaListShort
        }
    }
}

query MediaListCollection(
    $userId: Int!,
    $type: MediaType!,
    $status: MediaListStatus
    $sort: [MediaListSort] = [UPDATED_TIME_DESC]
) {
    MediaListCollection(
        userId: $userId,
        type: $type,
        status: $status,
        sort: $sort
    ) {
        lists {
            entries {
                ...MediaListShort
            }
        }
    }
}

query MediaListEntryShort(
    $malId: Int!,
    $type: MediaType!
) {
    Media(
        idMal: $malId,
        type: $type
    ) {
        ...MediaListEntryShort
    }
}

fragment MediaListEntryShort on Media {
    id
    mediaListEntry {
        id
    }
}