query MediaDetails(
    $type: MediaType!,
    $id: Int,
    $malId: Int
) {
    Media(
        id: $id,
        idMal: $malId,
        type: $type
    ) {
        id,
        idMal,
        type
        title {
            english
            romaji
            native
        }
        synonyms
        coverImage {
            extraLarge
            large
            medium
        }
        description(asHtml: true)
        format
        status
        genres
        source
        characters(sort: [RELEVANCE, ROLE, FAVOURITES_DESC]) {
            pageInfo {
                hasNextPage
            }
            nodes {
                ...ALCharacterShort
            }
        }
        mediaListEntry {
            ...ALRateEntry
        }
        relations {
            edges {
                ...ALRelatedMediaShort
            }
        }
        stats {
            ...ALMediaStats
        }
        season
        episodes
        chapters
        volumes
        meanScore
        averageScore
        duration
        nextAiringEpisode {
            ...ALAiringEpisodeShort
        }
        startDate {
            ...Date
        }
        endDate {
            ...Date
        }
        reviews(perPage: 4, sort: [RATING_DESC]) {
            nodes {
                ...ALReviewShort
            }
            pageInfo {
                hasNextPage
            }
        }
        studios(isMain: true) {
            nodes {
                ...ALStudioShort
            }
        }
        staff(perPage: 4, sort: [RELEVANCE, ROLE]) {
            edges {
                ...ALStaffEdgeShort
            }
        }
        isFavourite
    }

    Page(page: 1, perPage: 9) {
        mediaList(mediaId: $id, isFollowing: true, sort: [UPDATED_TIME_DESC]) {
            ...MediaFollowingShort
        }
        pageInfo {
            hasNextPage
        }
    }
}

query MediaBrowse(
    $page: Int!,
    $perPage: Int!,
    $search: String,
    $status: MediaStatus,
    $sort: MediaSort!,
    $mediaType: MediaType!,
    $format: MediaFormat
    $score: Int,
    $genre: String,
    $season: MediaSeason
    $seasonYear: Int,
    $countryOfOrigin: CountryCode
) {
    Page(page: $page, perPage: $perPage) {
        media(
            search: $search,
            status: $status,
            sort: [$sort],
            type: $mediaType,
            format: $format,
            averageScore_greater: $score,
            genre: $genre,
            season: $season,
            seasonYear: $seasonYear,
            countryOfOrigin: $countryOfOrigin
        ) {
            ...MediaBrowse
        }
    }
}

query MediaFollowing(
    $page: Int!,
    $perPage: Int!,
    $mediaId: Int!,
    $sort: MediaListSort!
) {
    Page(page: $page, perPage: $perPage) {
        mediaList(mediaId: $mediaId, isFollowing: true, sort: [$sort]) {
            ...MediaFollowingShort
        }
    }
}

query StudioBrowse(
    $studioId: Int!,
    $page: Int!,
    $perPage: Int!,
    $sort: MediaSort,
    $onList: Boolean
) {
    Studio(id: $studioId) {
        media(page: $page, perPage: $perPage, sort: [$sort], onList: $onList, isMain: true) {
            nodes {
                ...MediaBrowse
            }
        }
    }
}

query MediaRecommendations(
    $mediaId: Int!,
    $page: Int!,
    $perPage: Int!
) {
    Media(id: $mediaId) {
        recommendations(page: $page, perPage: $perPage) {
            nodes {
                mediaRecommendation {
                    ...MediaBrowse
                }
            }
        }
    }
}

query MediaExternalLinks(
    $mediaId: Int!
) {
    Media(id: $mediaId) {
        externalLinks {
            icon
            site
            url
        }
    }
}

query MediaReview(
    $reviewId: Int!
) {
    Review(id: $reviewId) {
        ...ALReview
    }
}

query MediaReviews(
    $mediaId: Int!,
    $page: Int!,
    $perPage: Int!,
    $sort: ReviewSort!
) {
    Media(id: $mediaId) {
        reviews(page: $page, perPage: $perPage, sort: [$sort]) {
            nodes {
                ...ALReviewShort
            }
        }
    }
}

query AiringSchedule(
    $page: Int!,
    $perPage: Int!,
    $sort: AiringSort = TIME,
    $airingAtGreater: Int!,
    $airingAtLesser: Int!
) {
    Page(page: $page, perPage: $perPage) {
        airingSchedules(
            sort: [$sort],
            airingAt_greater: $airingAtGreater,
            airingAt_lesser: $airingAtLesser
        ) {
            ...ALAiringAnimeShort
        }
    }
}

query Studio(
    $studioId: Int!
) {
    Studio(id: $studioId) {
        ...ALStudio
    }
}