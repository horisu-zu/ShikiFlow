query Characters(
    $mediaId: Int!,
    $page: Int!,
    $perPage: Int!
) {
    Media(id: $mediaId) {
        characters(page: $page, perPage: $perPage, sort: [RELEVANCE,ROLE]) {
            edges {
                node {
                    ...ALCharacterShort
                }
                role
                voiceActors(language: JAPANESE) {
                    ...ALStaffShort
                }
            }
        }
    }
}

query CharacterDetails(
    $id: Int!
) {
    Character(id: $id) {
        id
        name {
            full
            native
            alternativeSpoiler
        }
        image {
            large
        }
        anime: media(sort: [POPULARITY_DESC], type: ANIME) {
            ...ALCharacterMediaRoles
        }
        manga: media(sort: [POPULARITY_DESC], type: MANGA) {
            ...ALCharacterMediaRoles
        }
        description(asHtml: true)
    }
}

query CharacterMediaAppearances(
    $characterId: Int!,
    $page: Int!,
    $perPage: Int!,
    $mediaType: MediaType!,
    $sort: MediaSort!
) {
    Character(id: $characterId) {
        media(page: $page, perPage: $perPage, type: $mediaType, sort: [$sort]) {
            ...ALCharacterMediaRoles
        }
    }
}