query ShortUserRate(
    $userId: Int!,
    $mediaType: MediaType!
) {
    MediaListCollection(userId: $userId, type: $mediaType) {
        lists {
            entries {
                ...ALRateEntryShort
            }
        }
    }
}

mutation SaveUserRate(
    $rateEntryId: Int,
    $mediaId: Int!,
    $mediaStatus: MediaListStatus!,
    $progress: Int,
    $progressVolumes: Int,
    $repeat: Int,
    $scoreRaw: Int
) {
    SaveMediaListEntry(
        id: $rateEntryId,
        mediaId: $mediaId,
        status: $mediaStatus,
        progress: $progress,
        progressVolumes: $progressVolumes,
        repeat: $repeat,
        scoreRaw: $scoreRaw
    ) {
        ...ALRateEntry
    }
}