query CurrentUser {
    Viewer {
        ...ALUserShort
    }
}

query UserSearch(
    $page: Int,
    $limit: Int,
    $search: String
) {
    Page(page: $page, perPage: $limit) {
        users(search: $search) {
            ...ALUserShort
        }
    }
}

query UserActivities(
    $page: Int,
    $limit: Int,
    $userId: Int
) {
    Page(page: $page, perPage: $limit) {
        activities(userId: $userId, sort: [ID_DESC]) {
            ...on ListActivity {
                ...ALListActivity
            }
            ...on TextActivity {
                ...ALTextActivity
            }
            ...on MessageActivity {
                ...ALMessageActivity
            }
        }
    }
}

query UserStats(
    $userId: Int!
) {
    User(id: $userId) {
        statistics {
            anime {
                ...ALUserListStats
            }
            manga {
                ...ALUserListStats
            }
        }
    }
}

