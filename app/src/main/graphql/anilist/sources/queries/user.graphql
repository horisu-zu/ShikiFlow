query UserStatsCategories(
    $userId: Int!
) {
    followingsPage: Page {
        following(userId: $userId) {
            id
        }
    }
    followersPage: Page {
        followers(userId: $userId) {
            id
        }
    }
    threadsPage: Page {
        threads(userId: $userId) {
            id
        }
    }
    commentsPage: Page {
        threadComments(userId: $userId) {
            id
        }
    }
    User(id: $userId) {
        statistics {
            anime {
                count
            }
            manga {
                count
            }
        }
        favourites {
            anime {
                pageInfo {
                    ...ALPageInfoShort
                }
            }
            manga {
                pageInfo {
                    ...ALPageInfoShort
                }
            }
            characters {
                pageInfo {
                    ...ALPageInfoShort
                }
            }
            staff {
                pageInfo {
                    ...ALPageInfoShort
                }
            }
            studios {
                pageInfo {
                    ...ALPageInfoShort
                }
            }
        }
    }
}

query UserFavoriteAnime(
    $page: Int!,
    $limit: Int!,
    $userId: Int!
) {
    User(id: $userId) {
        favourites {
            anime(page: $page, perPage: $limit) {
                nodes {
                    ...ALFavoriteMediaShort
                }
            }
        }
    }
}

