query CurrentUser {
    Viewer {
        ...ALUserShort
    }
}

query Users(
    $page: Int,
    $limit: Int,
    $search: String
) {
    Page(page: $page, perPage: $limit) {
        users(search: $search) {
            ...ALUserShort
        }
    }
}

query UserActivities(
    $page: Int,
    $limit: Int,
    $userId: Int
) {
    Page(page: $page, perPage: $limit) {
        activities(userId: $userId, sort: [ID_DESC]) {
            ...on ListActivity {
                ...ALUserActivity
            }
        }
    }
}

query UserRates(
    $userId: Int!
) {
    User(id: $userId) {
        statistics {
            anime {
                ...ALUserListStats
            }
            manga {
                ...ALUserListStats
            }
        }
    }
}

query UserStatsCategories(
    $userId: Int!
) {
    User(id: $userId) {
        statistics {
            anime {
                count
            }
            manga {
                count
            }
        }
        favourites {
            anime {
                pageInfo {
                    ...ALPageInfoShort
                }
            }
            manga {
                pageInfo {
                    ...ALPageInfoShort
                }
            }
            characters {
                pageInfo {
                    ...ALPageInfoShort
                }
            }
            staff {
                pageInfo {
                    ...ALPageInfoShort
                }
            }
            studios {
                pageInfo {
                    ...ALPageInfoShort
                }
            }
        }
    }
}

query UserFavoriteAnime(
    $page: Int!,
    $limit: Int!,
    $userId: Int!
) {
    User(id: $userId) {
        favourites {
            anime(page: $page, perPage: $limit) {
                nodes {
                    ...ALFavoriteMediaShort
                }
            }
        }
    }
}

