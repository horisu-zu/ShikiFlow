mutation SaveUserRate(
    $rateEntryId: Int,
    $mediaId: Int!,
    $mediaStatus: MediaListStatus!,
    $progress: Int,
    $progressVolumes: Int,
    $repeat: Int,
    $score: Float
) {
    SaveMediaListEntry(
        id: $rateEntryId,
        mediaId: $mediaId,
        status: $mediaStatus,
        progress: $progress,
        progressVolumes: $progressVolumes,
        repeat: $repeat,
        score: $score
    ) {
        ...ALRateEntry
    }
}